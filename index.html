<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Зелений Хутір — Адмін-панель 2026</title>
  <link href="https://fonts.googleapis.com" rel="stylesheet">
  <style>
    :root {
      --primary: #1b4d3e;
      --accent: #2ecc71;
      --secondary: #e67e22;
      --bg-creme: #f9f7f2;
      --white: #ffffff;
      --text-main: #2c3e50;
      --text-muted: #7f8c8d;
      --shadow: 0 12px 40px rgba(0,0,0,0.08);
      --border-radius: 16px;
    }

    * {
      box-sizing: border-box;
      outline: none;
    }

    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background-color: var(--bg-creme);
      color: var(--text-main);
    }

    header {
      background: var(--primary);
      padding: 15px 5%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: var(--white);
    }

    .brand i {
      font-size: 32px;
      color: var(--accent);
    }

    .brand span {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
    }

    .header-nav {
      display: flex;
      gap: 10px;
    }

    .btn-header {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: var(--white);
      padding: 10px 15px;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: 0.3s;
    }

    .btn-header:hover {
      background: var(--accent);
      color: var(--primary);
    }

    #adminLoginBtn {
      display: none;
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--secondary);
      color: var(--white);
      padding: 12px 20px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
      box-shadow: var(--shadow);
      transition: 0.3s;
      z-index: 999;
    }

    #adminLoginBtn:hover {
      background: #d35400;
      transform: translateY(-2px);
    }

    .hero {
      background: var(--primary);
      color: var(--white);
      padding: 60px 5% 80px;
      text-align: center;
      clip-path: ellipse(100% 100% at 50% 0%);
    }

    .hero h1 {
      margin: 0;
      font-size: 2.5rem;
    }

    .hero p {
      margin: 10px 0 0 0;
      font-size: 1.1rem;
    }

    .catalog {
      padding: 40px 5%;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 25px;
    }

    .card {
      background: var(--white);
      border-radius: var(--border-radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: 0.3s;
      position: relative;
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .card-content {
      padding: 20px;
    }

    .card-category {
      color: var(--accent);
      font-size: 10px;
      font-weight: 800;
    }

    .card-title {
      margin: 10px 0;
      font-size: 1rem;
    }

    .price {
      font-size: 22px;
      font-weight: 800;
      color: var(--primary);
    }

    .del-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #e74c3c;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      display: none;
      font-weight: 600;
      transition: 0.3s;
    }

    .del-btn:hover {
      background: #c0392b;
    }

    .del-btn.visible {
      display: block;
    }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(5px);
      z-index: 2000;
      justify-content: center;
      align-items: center;
    }

    .overlay.active {
      display: flex;
    }

    .modal {
      background: white;
      padding: 30px;
      border-radius: 20px;
      width: 90%;
      max-width: 450px;
      position: relative;
    }

    .modal h2 {
      margin-top: 0;
      margin-bottom: 20px;
    }

    .input-group {
      margin-bottom: 15px;
    }

    .input-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: 600;
      font-size: 14px;
    }

    .input-group input,
    .input-group select {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-family: inherit;
      font-size: 14px;
    }

    .submit-btn {
      width: 100%;
      padding: 15px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s;
      color: var(--white);
    }

    .submit-btn:hover {
      background: #27ae60;
    }

    .logout-btn {
      margin-top: 10px;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      width: 100%;
      padding: 10px;
      font-size: 14px;
      transition: 0.3s;
    }

    .logout-btn:hover {
      color: var(--text-main);
    }

    .close-icon {
      position: absolute;
      top: 15px;
      right: 15px;
      cursor: pointer;
      font-size: 24px;
      color: var(--text-muted);
      transition: 0.3s;
    }

    .close-icon:hover {
      color: var(--text-main);
    }
  </style>
</head>
<body>

  <header>
    <a href="#" class="brand">
      <i class="material-icons-round">Psychology_alt</i>
      <span>Зелений Хутір</span>
    </a>
    <div class="header-nav">
      <button class="btn-header" id="adminBtn" onclick="toggleAdminModal()" style="display: none;">
        <i class="material-icons-round">admin_panel_settings</i>
        <span>Адмін</span>
      </button>
    </div>
  </header>

  <section class="hero">
    <h1>Авторське насіння 2026</h1>
    <p>Створіть сад своєї мрії з нашою колекцією</p>
  </section>

  <main class="catalog">
    <div class="grid" id="productGrid">
      <!-- Товари будуть тут -->
    </div>
  </main>

  <button id="adminLoginBtn" onclick="showAdminAuthModal()">🔐 Адмін вхід</button>

  <div id="adminOverlay" class="overlay">
    <div class="modal">
      <span class="close-icon" onclick="toggleAdminModal()">×</span>

      <div id="adminAuth">
        <h2 style="margin-top:0">Вхід в систему</h2>
        <div class="input-group">
          <label>Пароль</label>
          <input type="password" id="adminPass" placeholder="Введіть пароль">
        </div>
        <button class="submit-btn" onclick="loginAdmin()">Увійти</button>
      </div>

      <div id="adminPanel" style="display:none">
        <h2>Додати товар</h2>
        <div class="input-group">
          <label>Назва насіння</label>
          <input type="text" id="pName" placeholder="Томат 'Черрі'">
        </div>
        <div class="input-group">
          <label>Ціна (грн)</label>
          <input type="number" id="pPrice" placeholder="50">
        </div>
        <div class="input-group">
          <label>Категорія</label>
          <select id="pCat">
            <option>Овочі</option>
            <option>Квіти</option>
            <option>Зелень</option>
          </select>
        </div>
        <div class="input-group">
          <label>Посилання на фото</label>
          <input type="text" id="pImg" placeholder="https://images.com">
        </div>
        <button class="submit-btn" onclick="saveProduct()">Опублікувати</button>
        <button class="logout-btn" onclick="logoutAdmin()">Вийти</button>
      </div>
    </div>
  </div>

  <script>
    const defaultProducts = [
      { id: 1, name: "Томат 'Чорний Принц'", price: 45, category: "Овочі", image: "https://images.unsplash.com/photo-1592753126757-37c56c6b54b9" },
      { id: 2, name: "Базилік 'Смарагд'", price: 30, category: "Зелень", image: "https://images.unsplash.com/photo-1464207687429-7505649dae38" }
    ];

    let isAdmin = false;

    function loadProducts() {
      const grid = document.getElementById('productGrid');
      const saved = localStorage.getItem('hutor_seeds');
      const products = saved ? JSON.parse(saved) : defaultProducts;

      if (!saved) localStorage.setItem('hutor_seeds', JSON.stringify(defaultProducts));

      grid.innerHTML = products.map(p => `
        <div class="card">
          <button class="del-btn ${isAdmin ? 'visible' : ''}" onclick="deleteProduct(${p.id})">
            Видалити
          </button>
          <img src="${p.image}" alt="${p.name}">
          <div class="card-content">
            <div class="card-category">${p.category.toUpperCase()}</div>
            <h3 class="card-title">${p.name}</h3>
            <div class="price">${p.price} <span>грн</span></div>
          </div>
        </div>
      `).join('');
    }

    function toggleAdminModal() {
      document.getElementById('adminOverlay').classList.toggle('active');
    }

    function showAdminAuthModal() {
      document.getElementById('adminAuth').style.display = 'block';
      document.getElementById('adminPanel').style.display = 'none';
      document.getElementById('adminPass').value = '';
      toggleAdminModal();
      document.getElementById('adminPass').focus();
    }

    function loginAdmin() {
      const password = document.getElementById('adminPass').value;
      if (password === "swmena568") {
        isAdmin = true;
        document.getElementById('adminAuth').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        document.getElementById('adminBtn').style.display = 'flex';
        loadProducts();
      } else {
        alert("❌ Невірний пароль!");
        document.getElementById('adminPass').value = '';
      }
    }

    function logoutAdmin() {
      isAdmin = false;
      document.getElementById('adminBtn').style.display = 'none';
      document.getElementById('adminLoginBtn').style.display = 'none';
      document.getElementById('adminAuth').style.display = 'block';
      document.getElementById('adminPanel').style.display = 'none';
      toggleAdminModal();
      loadProducts();
    }

    function saveProduct() {
      const name = document.getElementById('pName').value.trim();
      const price = document.getElementById('pPrice').value.trim();
      const cat = document.getElementById('pCat').value;
      const img = document.getElementById('pImg').value.trim() || 'https://via.placeholder.com/250x200';

      if (!name || !price) {
        alert("⚠️ Заповніть назву та ціну!");
        return;
      }

      const products = JSON.parse(localStorage.getItem('hutor_seeds'));
      products.push({
        id: Date.now(),
        name,
        price: parseInt(price),
        category: cat,
        image: img
      });

      localStorage.setItem('hutor_seeds', JSON.stringify(products));
      loadProducts();

      document.getElementById('pName').value = '';
      document.getElementById('pPrice').value = '';
      document.getElementById('pImg').value = '';

      alert("✅ Товар успішно додано!");
    }

    function deleteProduct(id) {
      if (!confirm("Видалити цей товар?")) return;
      let products = JSON.parse(localStorage.getItem('hutor_seeds'));
      products = products.filter(p => p.id !== id);
      localStorage.setItem('hutor_seeds', JSON.stringify(products));
      loadProducts();
    }

    // Клавіатурний скорочення Ctrl + Shift + A для показу кнопки входу
    document.addEventListener('keydown', function(event) {
      if (event.ctrlKey && event.shiftKey && event.key === 'A') {
        event.preventDefault();
        document.getElementById('adminLoginBtn').style.display = 'block';
      }
    });

    window.addEventListener('load', loadProducts);
  </script>

</body>
</html>
